version: '3.8'

services:
  constructioniq-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8161:8161"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cc
      - SPRING_DATASOURCE_USERNAME=cc
      - SPRING_DATASOURCE_PASSWORD=cc
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - CC_AUTH_KEYCLOAK_URL=http://keycloak:8180
      - CC_AI_GATEWAY_URL=http://litellm:4000
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=cc
      - POSTGRES_USER=cc
      - POSTGRES_PASSWORD=cc
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
