server:
  port: 8111
spring:
  application:
    name: notificationhub
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notificationhub}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

cc:
  ai:
    litellm:
      base-url: ${LITELLM_URL:http://localhost:4000}
      api-key: ${LITELLM_API_KEY:sk-1234}
      model: ${LITELLM_MODEL:gpt-4}
  auth:
    enabled: false # disable auth for development

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
