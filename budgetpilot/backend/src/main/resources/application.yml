spring:
  application:
    name: budgetpilot
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/budgetpilot}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

cc:
  tenancy:
    enabled: true
  ai:
    enabled: true
    provider: openai
    base-url: ${LITELLM_URL:http://localhost:4000}
    api-key: ${LITELLM_KEY:sk-dummy}
  audit:
    enabled: false
  search:
    enabled: false
  queue:
    enabled: false
  payments:
    enabled: false
