spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false

cc:
  tenancy:
    enabled: false
  ai:
    enabled: false
  audit:
    enabled: false
  search:
    enabled: false
  queue:
    enabled: false
  payments:
    enabled: false
