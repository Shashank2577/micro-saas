spring:
  application:
    name: dataqualityai
  datasource:
    url: jdbc:postgresql://localhost:5432/microsaas
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8158

cc:
  tenancy:
    mode: header
    header-name: X-Tenant-ID
  auth:
    keycloak-url: http://localhost:8180
    realm: cc
    client-id: cc-backend
  ai:
    gateway-url: http://localhost:4000
    api-key: sk-local-dev-key
    default-model: claude-sonnet-4-6

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

litellm:
  url: http://localhost:4000
