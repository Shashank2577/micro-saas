server:
  port: 8080

spring:
  application:
    name: retailintelligence
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:retailintelligence}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

cc:
  ai:
    gateway-url: ${AI_GATEWAY_URL:http://localhost:4000}
    api-key: ${AI_API_KEY:default_key}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
