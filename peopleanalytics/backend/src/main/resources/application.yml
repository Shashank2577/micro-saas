spring:
  application:
    name: peopleanalytics
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:peopleanalytics}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8142}

cc:
  ai:
    provider: ${AI_PROVIDER:litellm}
    model: ${AI_MODEL:gpt-3.5-turbo}
    url: ${AI_URL:http://localhost:4000}
    api-key: ${AI_API_KEY:mock}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
