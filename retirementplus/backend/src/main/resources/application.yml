spring:
  application:
    name: retirementplus
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:retirementplus}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8207}

cc:
  ai:
    gateway-url: ${AI_GATEWAY_URL:http://localhost:4000}
    api-key: ${AI_API_KEY:sk-1234}
