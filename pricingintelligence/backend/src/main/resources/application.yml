spring:
  application:
    name: pricingintelligence
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8174}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

cc:
  ai:
    provider: litellm
    litellm:
      base-url: ${LITELLM_URL:http://localhost:4000}
      api-key: ${LITELLM_API_KEY:sk-1234}
  tenancy:
    enabled: true
