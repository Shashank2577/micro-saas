spring:
  application:
    name: apigatekeeper
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:apigatekeeper}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8102}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# cc-starter configuration
cc:
  ai:
    provider: ${AI_PROVIDER:litellm}
    base-url: ${AI_BASE_URL:http://localhost:4000}
    api-key: ${AI_API_KEY:sk-1234}
    model: ${AI_MODEL:gpt-4o}

resilience4j.circuitbreaker:
  instances:
    gateway:
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 3
      automaticTransitionFromOpenToHalfOpenEnabled: true
      waitDurationInOpenState: 5s
      failureRateThreshold: 50
