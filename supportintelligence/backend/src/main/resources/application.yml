spring:
  application:
    name: supportintelligence
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:supportintelligence}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8154

ai:
  provider: litellm
  litellm:
    base-url: ${LITELLM_BASE_URL:http://localhost:4000}
    api-key: ${LITELLM_API_KEY:sk-mock-key}
    model: ${LITELLM_MODEL:claude-3-sonnet}
