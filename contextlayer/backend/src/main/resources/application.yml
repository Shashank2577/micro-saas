spring:
  application:
    name: contextlayer
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate

cc:
  tenancy:
    enabled: true
  ai:
    # Use environment variables, no hardcoded API keys
    api-key: ${AI_API_KEY}
