spring:
  application:
    name: featureflagai-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: PUBLIC
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

cc:
  tenancy:
    enabled: false
    mode: header
    header-name: X-Tenant-ID
