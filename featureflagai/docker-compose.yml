version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: featureflagai/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=featureflagai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SERVER_PORT=8080
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=featureflagai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: