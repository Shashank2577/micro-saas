version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8147:8147"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cc
      - SPRING_DATASOURCE_USERNAME=cc
      - SPRING_DATASOURCE_PASSWORD=cc
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8147

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=cc
      - POSTGRES_USER=cc
      - POSTGRES_PASSWORD=cc
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
