server:
  port: ${PORT:8091}

spring:
  application:
    name: legalresearch
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/legalresearch}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

cc:
  tenancy:
    enabled: true
  ai:
    provider: litellm
    base-url: ${LITELLM_URL:http://localhost:4000}
