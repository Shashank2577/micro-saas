version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8090:8090"]
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/telemetrycore
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on: [db, redis]
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8090
  db:
    image: postgres:16-alpine
    environment: [POSTGRES_DB=telemetrycore, POSTGRES_USER=postgres, POSTGRES_PASSWORD=postgres]
    volumes: [telemetrycore_data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
volumes:
  telemetrycore_data:
