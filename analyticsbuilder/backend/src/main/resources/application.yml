spring:
  application:
    name: analyticsbuilder
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:analyticsbuilder_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8168

logging:
  level:
    root: INFO
    com.microsaas: DEBUG

cc:
  ai:
    enabled: true
    provider: litellm
    litellm:
      base-url: http://localhost:4000
