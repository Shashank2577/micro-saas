server:
  port: 8206
  forward-headers-strategy: framework

spring:
  application:
    name: cashflowanalyzer
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/microsaas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

cc:
  auth:
    realm: microsaas
  tenancy:
    mode: header
  webhooks:
    enabled: true
