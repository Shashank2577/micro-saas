server:
  port: 8206

spring:
  application:
    name: cashflowanalyzer
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecosystem}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

cc:
  tenancy:
    enabled: true
  ai:
    provider: litellm
    base-url: ${LITELLM_URL:http://localhost:4000}
