spring:
  application:
    name: engagementpulse
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:engagementpulse_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8144

app:
  llm:
    api-key: ${LLM_API_KEY:dummy_key_for_local}
    base-url: ${LLM_BASE_URL:http://localhost:4000}
    model: ${LLM_MODEL:gpt-3.5-turbo}
