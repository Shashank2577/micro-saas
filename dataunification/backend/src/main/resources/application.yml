spring:
  application:
    name: dataunification
  datasource:
    url: jdbc:postgresql://localhost:5432/platform
    username: platform_user
    password: platform_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8170

crosscutting:
  tenancy:
    enabled: true
  auth:
    enabled: true
  webhook:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
