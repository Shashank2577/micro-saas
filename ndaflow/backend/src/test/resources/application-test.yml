spring:
  application:
    name: ndaflow
  datasource:
    url: jdbc:postgresql://localhost:5432/cc
    username: cc
    password: cc
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ndaflow
  flyway:
    locations: classpath:db/migration
    default-schema: ndaflow
    schemas: ndaflow
