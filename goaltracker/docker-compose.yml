version: '3.8'

services:
  goaltracker-backend:
    build:
      context: ..
      dockerfile: goaltracker/backend/Dockerfile
    ports:
      - "8205:8080"
    environment:
      - SERVER_PORT=8080
      - DB_URL=jdbc:postgresql://goaltracker-postgres:5432/nexus
      - DB_USER=nexus_user
      - DB_PASSWORD=nexus_password
      - KEYCLOAK_URL=http://keycloak:8180
      - AI_GATEWAY_URL=http://litellm:4000
    depends_on:
      goaltracker-postgres:
        condition: service_healthy

  goaltracker-postgres:
    image: postgres:16-alpine
    ports:
      - "5432"
    environment:
      - POSTGRES_DB=nexus
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=nexus_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
