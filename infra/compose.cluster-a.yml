
  observabilitystack-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: observabilitystack
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  observabilitystack-backend:
    build:
      context: ../observabilitystack/backend
      dockerfile: Dockerfile
    ports:
      - "8105:8105"
    environment:
      - DB_HOST=observabilitystack-db
      - DB_PORT=5432
      - DB_NAME=observabilitystack
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - LITELLM_URL=http://litellm:4000
    depends_on:
      observabilitystack-db:
        condition: service_healthy

  observabilitystack-frontend:
    build:
      context: ../observabilitystack/frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8105
