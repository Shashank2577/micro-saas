version: '3.8'

services:
  licenseguard-backend:
    build:
      context: ..
      dockerfile: licenseguard/backend/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/licenseguard
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - KEYCLOAK_URL=http://keycloak:8180
      - AI_GATEWAY_URL=http://litellm:4000
    depends_on:
      - db
    networks:
      - nexus-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=licenseguard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge
