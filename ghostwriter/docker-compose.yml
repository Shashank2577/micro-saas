version: '3.8'

services:
  ghostwriter-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ghostwriter
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - AI_GATEWAY_URL=http://nexus-hub:8080
    depends_on:
      - db
    networks:
      - microsaas-network

  ghostwriter-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - ghostwriter-backend
    networks:
      - microsaas-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ghostwriter
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - microsaas-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  microsaas-network:
    external: true

volumes:
  postgres_data:
