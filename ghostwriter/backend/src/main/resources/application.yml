spring:
  application:
    name: ghostwriter
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

cc:
  ai:
    gateway-url: ${AI_GATEWAY_URL:http://ai-gateway:8080/v1/chat/completions}
    api-key: ${AI_API_KEY:sk-default-key}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
