server:
  port: ${PORT:8093}

spring:
  application:
    name: performancenarrative
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/microsaas?currentSchema=performancenarrative}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: performancenarrative
    default-schema: performancenarrative

cc:
  tenancy:
    enabled: true
  ai:
    provider: litellm
    litellm:
      url: ${LITELLM_URL:http://localhost:4000}
      api-key: ${LITELLM_API_KEY:sk-1234}
