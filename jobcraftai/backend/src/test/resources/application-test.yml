spring:
  application:
    name: jobcraftai-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS tenant\;CREATE SCHEMA IF NOT EXISTS cc\;CREATE SCHEMA IF NOT EXISTS audit
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: tenant
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-key

cc:
  tenancy:
    mode: header
    header-name: X-Tenant-ID
  auth:
    enabled: false
  ai:
    enabled: false
