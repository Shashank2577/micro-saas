server:
  port: 8149

spring:
  application:
    name: marketsignal
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketsignal}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

litellm:
  base-url: ${LITELLM_BASE_URL:http://localhost:4000}
  api-key: ${LITELLM_API_KEY:sk-1234}
  model: ${LITELLM_MODEL:claude-3-haiku-20240307}
  embedding-model: ${LITELLM_EMBEDDING_MODEL:text-embedding-3-small}

crosscutting:
  tenancy:
    enabled: true
