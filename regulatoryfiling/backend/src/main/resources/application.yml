server:
  port: ${PORT:8093}

spring:
  application:
    name: regulatoryfiling
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:regulatoryfiling}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

cc:
  tenancy:
    enabled: true
  ai:
    provider: litellm
    url: ${LITELLM_URL:http://localhost:4000}

logging:
  level:
    com.microsaas: DEBUG
