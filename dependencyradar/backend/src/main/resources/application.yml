spring:
  application:
    name: dependencyradar
  datasource:
    url: jdbc:h2:mem:dependencyradar;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
server:
  port: 8092
